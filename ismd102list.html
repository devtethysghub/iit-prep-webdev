<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
   <!-- Lists are used to group related items in a list format. There are three types of lists in HTML: ordered lists, unordered lists, and definition lists. --> 
    <!--Definition Lists: A definition list is used to define terms and their corresponding definitions. It consists of a series of terms and their definitions. The <dl> element is used to create a definition list, and the <dt> and <dd> elements are used to define the terms and their definitions, respectively. -->
        <h1>Modern Physics</h1>
        <dl>
            <dt><strong>Thomson's Model</strong></dt>
            <dd>Thomson's Model gives us the first human insights on the electrical neutrality of an atom</dd>
            
        </dl>
        <ul><strong>Names of Ananya (Unordered)</strong>
            <li>Buniya</li>
            <li>Bhaggu</li>
            <li>Sebu</li>
        </ul>
        <ol><strong>Names of Me(Ordered)</strong>
            <li>Utkarsh</li>
            <li>Shivam</li>
            <li>Shivu</li>
        </ol>
    </body>
</html>
